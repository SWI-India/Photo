<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#285943">
  <title>SWI Daily Field Report</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <header class="app-header">
    <div class="brand-lockup">
      <img src="/swi-logo.png" alt="SWI India logo">
      <div><span class="eyebrow">SWI</span><h1>Daily Field Report</h1></div>
    </div>
  </header>
  <main>
    <article id="report" class="card"><p>Loading report…</p></article>
  </main>
  <div id="galleryDialog" class="gallery-dialog hidden" role="dialog" aria-modal="true">
    <button id="galleryClose" class="gallery-close" aria-label="Close viewer">Close</button>
    <button id="galleryPrev" class="gallery-nav gallery-prev" aria-label="Previous media">‹</button>
    <div id="galleryStage" class="gallery-stage"></div>
    <button id="galleryNext" class="gallery-nav gallery-next" aria-label="Next media">›</button>
    <div id="galleryCaption" class="gallery-caption"></div>
  </div>
  <script>
    const token = location.pathname.split("/").pop();
    let reportMedia = [];
    let activeMediaIndex = 0;
    let touchStartX = 0;
    const escapeHtml = (value) => String(value ?? "").replace(/[&<>"']/g, (c) => ({
      "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#039;"
    })[c]);
    function openGallery(index) {
      activeMediaIndex = index;
      renderGalleryItem();
      document.querySelector("#galleryDialog").classList.remove("hidden");
    }
    function closeGallery() {
      const video = document.querySelector("#galleryStage video");
      if (video) video.pause();
      document.querySelector("#galleryDialog").classList.add("hidden");
    }
    function moveGallery(step) {
      if (!reportMedia.length) return;
      activeMediaIndex = (activeMediaIndex + step + reportMedia.length) % reportMedia.length;
      renderGalleryItem();
    }
    function renderGalleryItem() {
      const file = reportMedia[activeMediaIndex];
      const source = file.media_url || file.public_url;
      document.querySelector("#galleryStage").innerHTML = file.mime_type.startsWith("image/")
        ? `<img src="${escapeHtml(source)}" alt="${escapeHtml(file.original_name)}">`
        : `<video src="${escapeHtml(source)}" controls autoplay playsinline></video>`;
      document.querySelector("#galleryCaption").textContent =
        `${activeMediaIndex + 1} / ${reportMedia.length} - ${file.original_name}`;
    }
    fetch(`/api/public/reports/${token}`)
      .then(async (response) => {
        const data = await response.json();
        if (!response.ok) throw new Error(data.error);
        return data;
      })
      .then((report) => {
        reportMedia = report.media || [];
        const media = reportMedia.map((file, index) => {
          const source = file.media_url || file.public_url;
          const view = file.mime_type.startsWith("image/")
            ? `<img src="${escapeHtml(file.thumbnail_url || source)}" alt="${escapeHtml(file.original_name)}">`
            : `<video src="${escapeHtml(source)}" muted playsinline></video>`;
          return `<button class="media-chip media-open" data-index="${index}">${view}<span>${escapeHtml(file.original_name)}</span></button>`;
        }).join("");
        document.querySelector("#report").innerHTML = `
          <span class="eyebrow">${escapeHtml(report.village_name)}</span>
          <h2>${escapeHtml(report.report_date)}</h2>
          <p><strong>Field person:</strong> ${escapeHtml(report.person_name)}</p>
          <p><strong>Report type:</strong> ${escapeHtml(report.report_type || "General Visit")}</p>
          ${report.latitude != null ? `<p><strong>GPS:</strong> ${report.latitude}, ${report.longitude}</p>` : ""}
          <hr>
          <h3>Report</h3>
          <p style="white-space:pre-wrap">${escapeHtml(report.report_text)}</p>
          ${media ? `<h3>Photos and videos</h3><div class="media-preview">${media}</div>` : ""}
        `;
        document.querySelectorAll("[data-index]").forEach((button) => {
          button.addEventListener("click", () => openGallery(Number(button.dataset.index)));
        });
      })
      .catch((error) => {
        document.querySelector("#report").innerHTML = `<h2>Report unavailable</h2><p>${escapeHtml(error.message)}</p>`;
      });
    document.querySelector("#galleryClose").addEventListener("click", closeGallery);
    document.querySelector("#galleryPrev").addEventListener("click", () => moveGallery(-1));
    document.querySelector("#galleryNext").addEventListener("click", () => moveGallery(1));
    document.querySelector("#galleryDialog").addEventListener("touchstart", (event) => {
      touchStartX = event.changedTouches[0].screenX;
    }, { passive: true });
    document.querySelector("#galleryDialog").addEventListener("touchend", (event) => {
      const delta = event.changedTouches[0].screenX - touchStartX;
      if (Math.abs(delta) > 45) moveGallery(delta > 0 ? -1 : 1);
    }, { passive: true });
    document.addEventListener("keydown", (event) => {
      if (document.querySelector("#galleryDialog").classList.contains("hidden")) return;
      if (event.key === "Escape") closeGallery();
      if (event.key === "ArrowLeft") moveGallery(-1);
      if (event.key === "ArrowRight") moveGallery(1);
    });
  </script>
</body>
</html>
